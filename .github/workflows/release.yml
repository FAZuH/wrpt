name: Release & Deploy

on:
  push:
    branches:
      - release

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    uses: ./.github/workflows/_release.yml
    with:
      binary-name: wrpt
      platforms: linux
      publish-crates: false
    secrets: inherit

  push-image:
    name: Docker Build & Push
    needs: [release]
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker Image
        run: docker load -i /tmp/docker-image.tar

      - name: Set lowercase repo owner
        id: repo
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push
        run: |
          TAG=${{ needs.release.outputs.tag }}
          docker tag wrpt:build ghcr.io/${{ steps.repo.outputs.owner }}/wrpt:latest
          docker tag wrpt:build ghcr.io/${{ steps.repo.outputs.owner }}/wrpt:${TAG}
          docker push ghcr.io/${{ steps.repo.outputs.owner }}/wrpt:latest
          docker push ghcr.io/${{ steps.repo.outputs.owner }}/wrpt:${TAG}
